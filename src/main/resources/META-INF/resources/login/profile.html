    <!-- 기존 로그인 등 페이지의 디자인을 재활용한다. -->
<section class="hero d-flex align-items-center justify-content-center text-center py-5">
    <div class="container" style="max-width: 500px;">
        <h2 class="fw-bold mb-4">👤 내 프로필</h2>

        <!-- 프로필 사진 영역 -->
        <div class="mb-4">
            <img id="profileImg"
                 src="/uploads/profile/default.png"
                 class="rounded-circle"
                 width="120"
                 height="120"
                 style="object-fit:cover; border:3px solid #fff;"
                 alt="프로필 사진">
        </div>

        <!-- 개인 정보 출력 -->
        <div class="card bg-dark text-white border-secondary mb-4">
            <div class="card-body text-start">
                <table class="table table-dark table-bordered mb-0">
                    <tr>
                        <th style="width:30%">아이디</th>
                        <td id="infoUsername"></td>
                    </tr>
                    <tr>
                        <th>이메일</th>
                        <td id="infoEmail"></td>
                    </tr>
                    <tr>
                        <th>연락처</th>
                        <td id="infoPhone"></td>
                    </tr>
                </table>
            </div>
        </div>

        <!-- 사진 업로드 폼 -->
        <form id="uploadForm"
              method="POST"
              action="/profile/upload"
              enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">프로필 사진 변경</label>
                <input type="file"
                       class="form-control"
                       id="profileFile"
                       name="profileImage"
                       accept="image/jpeg,image/png,image/gif,image/webp">

                <div class="form-text text-muted">
                    jpg, png, gif, webp / 최대 5MB
                </div>
            </div>

            <button type="submit"
                    class="btn btn-primary w-100">
                사진 업로드
            </button>
        </form>
    </div>
</section>

<!-- JS 연동 -->
<script src="../js/search.js"></script>
<script src="../js/toggle.js"></script>
<script src="../js/Profile.js"></script>
