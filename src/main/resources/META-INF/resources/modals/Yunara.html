<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yunara 상세 정보</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            background: #0a0e17;
            color: white;
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }

        .champion-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .champion-image {
            width: 100%;
            max-width: 400px;
            display: block;
            margin: 0 auto 24px auto;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            color: #c89b3c;
            margin-bottom: 20px;
        }

        .info-box {
            background: #111827;
            border: 1px solid #2a3447;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .info-box h2 {
            color: #f0c75e;
            font-size: 1.2rem;
            margin-bottom: 12px;
        }

        .info-box p {
            margin: 8px 0;
        }

        .highlight {
            color: #ffd369;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="champion-container">
        <h1>유나라 (Yunara)</h1>

        <img src="../images/Yunara.jpg" alt="Yunara" class="champion-image">

        <div class="info-box">
            <h2>기본 정보</h2>
            <p><span class="highlight">이름:</span> 유나라</p>
            <p><span class="highlight">포지션:</span> 정글</p>
            <p><span class="highlight">역할군:</span> 암살자</p>
            <p><span class="highlight">난이도:</span> 중상</p>
        </div>

        <div class="info-box">
            <h2>챔피언 소개</h2>
            <p>
                유나라는 빠른 기동력과 날카로운 기습 능력을 활용해 전장을 휘젓는 신규 챔피언입니다.
                적의 빈틈을 파고들어 순간적으로 큰 피해를 주는 플레이에 강점을 가집니다.
            </p>
        </div>

        <div class="info-box">
            <h2>플레이 특징</h2>
            <p>• 빠른 이동기로 전장을 넓게 활용할 수 있습니다.</p>
            <p>• 적 후방을 노리는 기습 플레이에 강합니다.</p>
            <p>• 진입 타이밍과 생존 판단이 중요한 챔피언입니다.</p>
        </div>

        <div class="info-box">
            <h2>추천 문구</h2>
            <p>
                “그림자처럼 파고들어 전장을 흔드는 기습형 챔피언”
            </p>
        </div>
    </div>
</body>
</html>
