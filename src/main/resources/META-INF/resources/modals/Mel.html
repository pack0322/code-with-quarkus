<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mel 상세 정보</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            background: #0a0e17;
            color: white;
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }

        .champion-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .champion-image {
            width: 100%;
            max-width: 400px;
            display: block;
            margin: 0 auto 24px auto;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            color: #c89b3c;
            margin-bottom: 20px;
        }

        .info-box {
            background: #111827;
            border: 1px solid #2a3447;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .info-box h2 {
            color: #f0c75e;
            font-size: 1.2rem;
            margin-bottom: 12px;
        }

        .info-box p {
            margin: 8px 0;
        }

        .highlight {
            color: #ffd369;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="champion-container">
        <h1>멜 (Mel)</h1>

        <img src="../images/Mel.jpg" alt="Mel" class="champion-image">

        <div class="info-box">
            <h2>기본 정보</h2>
            <p><span class="highlight">이름:</span> 멜</p>
            <p><span class="highlight">포지션:</span> 미드</p>
            <p><span class="highlight">역할군:</span> 메이지</p>
            <p><span class="highlight">난이도:</span> 중</p>
        </div>

        <div class="info-box">
            <h2>챔피언 소개</h2>
            <p>
                멜은 강력한 마법 능력을 바탕으로 전장을 지배하는 신규 챔피언입니다.
                긴 사거리 견제와 화려한 스킬 연계가 특징이며, 한타에서 높은 영향력을 발휘합니다.
            </p>
        </div>

        <div class="info-box">
            <h2>플레이 특징</h2>
            <p>• 원거리에서 안정적으로 적을 견제할 수 있습니다.</p>
            <p>• 광역 스킬을 활용해 팀 전투에서 강한 모습을 보입니다.</p>
            <p>• 스킬 타이밍과 위치 선정이 중요한 챔피언입니다.</p>
        </div>

        <div class="info-box">
            <h2>추천 문구</h2>
            <p>
                “전장의 흐름을 바꾸는 강력한 마법형 챔피언”
            </p>
        </div>
    </div>
</body>
</html>
