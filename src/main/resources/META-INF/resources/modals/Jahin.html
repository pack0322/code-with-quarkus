<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jahin 상세 정보</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            background: #0a0e17;
            color: white;
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }

        .champion-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .champion-image {
            width: 100%;
            max-width: 400px;
            display: block;
            margin: 0 auto 24px auto;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            color: #c89b3c;
            margin-bottom: 20px;
        }

        .info-box {
            background: #111827;
            border: 1px solid #2a3447;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .info-box h2 {
            color: #f0c75e;
            font-size: 1.2rem;
            margin-bottom: 12px;
        }

        .info-box p {
            margin: 8px 0;
        }

        .highlight {
            color: #ffd369;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="champion-container">
        <h1>자힌 (Jahin)</h1>

        <img src="../images/Jahin.png" alt="Jahin" class="champion-image">

        <div class="info-box">
            <h2>기본 정보</h2>
            <p><span class="highlight">이름:</span> 자힌</p>
            <p><span class="highlight">포지션:</span> 탑</p>
            <p><span class="highlight">역할군:</span> 전사</p>
            <p><span class="highlight">난이도:</span> 중</p>
        </div>

        <div class="info-box">
            <h2>챔피언 소개</h2>
            <p>
                자힌은 높은 내구성과 강한 근접 전투 능력을 바탕으로 전장의 최전선을 책임지는 신규 챔피언입니다.
                아군을 지키면서도 적을 압박하는 묵직한 전투 스타일이 특징입니다.
            </p>
        </div>

        <div class="info-box">
            <h2>플레이 특징</h2>
            <p>• 근접 교전에서 안정적인 전투 수행이 가능합니다.</p>
            <p>• 높은 생존력을 바탕으로 전선 유지에 강합니다.</p>
            <p>• 한타에서 진입 각과 버티는 능력이 중요한 챔피언입니다.</p>
        </div>

        <div class="info-box">
            <h2>추천 문구</h2>
            <p>
                “전장의 최전선에서 아군을 지키는 강인한 전사형 챔피언”
            </p>
        </div>
    </div>
</body>
</html>
